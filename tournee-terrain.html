<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tournee 5S</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tournee 5S">
<meta name="application-name" content="Tournee 5S">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  background: #0f1117;
  color: #eef0f8;
  min-height: 100vh;
  overflow-x: hidden;
}
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #0f1117;
  border-bottom: 1px solid #2e3347;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
  height: 56px;
}
.logo {
  background: #f7c948;
  color: #000;
  font-weight: 800;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  letter-spacing: 1px;
  margin-right: 10px;
}
.header-left { display: flex; align-items: center; }
.header-info h1 { font-size: 15px; font-weight: 600; }
.header-info p  { font-size: 11px; color: #7a7f9a; }
.badge-count {
  background: #ff6b4a;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.screen { display: none; padding: 72px 14px 80px; }
.screen.active { display: block; }
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #1a1d27;
  border-top: 1px solid #2e3347;
  display: flex;
  height: 60px;
  z-index: 100;
}
#nav button {
  flex: 1;
  background: none;
  border: none;
  color: #7a7f9a;
  font-size: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
}
#nav button.active { color: #f7c948; }
#nav button svg { width: 22px; height: 22px; }
.stitle {
  font-size: 11px;
  color: #f7c948;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 12px;
}
.card {
  background: #1a1d27;
  border: 1px solid #2e3347;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.field { margin-bottom: 14px; }
label {
  display: block;
  font-size: 12px;
  color: #7a7f9a;
  font-weight: 600;
  margin-bottom: 6px;
}
input[type="text"],
input[type="date"],
textarea,
select {
  width: 100%;
  background: #22263a;
  border: 1px solid #2e3347;
  border-radius: 10px;
  color: #eef0f8;
  font-size: 14px;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  padding: 11px 13px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, textarea:focus, select:focus { border-color: #f7c948; }
textarea { resize: none; height: 80px; }
.stats-row { display: flex; gap: 8px; margin-bottom: 14px; }
.stat-box {
  flex: 1;
  background: #1a1d27;
  border: 1px solid #2e3347;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
}
.stat-num { font-size: 26px; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: 10px; color: #7a7f9a; margin-top: 4px; text-transform: uppercase; }
.red { color: #f87171; }
.yel { color: #f7c948; }
.blu { color: #60a5fa; }
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  cursor: pointer;
  margin-bottom: 10px;
}
.btn:active { opacity: 0.75; }
.btn-yellow { background: #f7c948; color: #000; }
.btn-ghost  { background: #22263a; color: #eef0f8; border: 1px solid #2e3347; }
.btn-green  { background: #4ade80; color: #000; }
.btn-sm {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: auto;
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  border: none;
  cursor: pointer;
}
.btn-sm:active { opacity: 0.75; }
.pchips { display: flex; gap: 8px; margin-bottom: 14px; }
.pchip {
  flex: 1;
  padding: 10px 4px;
  border-radius: 10px;
  border: 2px solid #2e3347;
  background: #22263a;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  color: #7a7f9a;
}
.pchip.sel-critique { border-color: #f87171; background: rgba(248,113,113,0.1); color: #f87171; }
.pchip.sel-majeur   { border-color: #f7c948; background: rgba(247,201,72,0.1);  color: #f7c948; }
.pchip.sel-mineur   { border-color: #60a5fa; background: rgba(96,165,250,0.1);  color: #60a5fa; }
.zchips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 14px;
  -webkit-overflow-scrolling: touch;
}
.zchips::-webkit-scrollbar { display: none; }
.zchip {
  white-space: nowrap;
  padding: 8px 14px;
  border-radius: 20px;
  background: #22263a;
  border: 1px solid #2e3347;
  color: #7a7f9a;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}
.zchip.active { background: #f7c948; border-color: #f7c948; color: #000; }
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.photo-thumb {
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  background: #22263a;
  position: relative;
  border: 1px solid #2e3347;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.del-ph {
  position: absolute;
  top: 4px; right: 4px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 24px; height: 24px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.add-photo-btn {
  aspect-ratio: 1;
  border-radius: 10px;
  background: #22263a;
  border: 2px dashed #2e3347;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  color: #7a7f9a;
  font-size: 11px;
}
.add-photo-btn svg { width: 26px; height: 26px; }
.prob-item {
  background: #1a1d27;
  border: 1px solid #2e3347;
  border-radius: 12px;
  padding: 13px;
  margin-bottom: 10px;
  display: flex;
  gap: 11px;
  align-items: flex-start;
}
.prob-item.resolved { opacity: 0.45; }
.prob-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.ic-critique { background: rgba(248,113,113,0.15); }
.ic-majeur   { background: rgba(247,201,72,0.12); }
.ic-mineur   { background: rgba(96,165,250,0.12); }
.prob-body { flex: 1; min-width: 0; }
.prob-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
.prob-meta { font-size: 11px; color: #7a7f9a; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
.b-critique { background: rgba(248,113,113,0.2); color: #f87171; }
.b-majeur   { background: rgba(247,201,72,0.15);  color: #f7c948; }
.b-mineur   { background: rgba(96,165,250,0.15);  color: #60a5fa; }
.prob-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.empty { text-align: center; padding: 50px 20px; color: #7a7f9a; }
.empty svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 12px; }
.empty p { font-size: 14px; }
#toast {
  position: fixed;
  top: 68px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: #22263a;
  color: #eef0f8;
  border: 1px solid #2e3347;
  border-radius: 30px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  transition: opacity 0.3s, transform 0.3s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: flex-end;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #1a1d27;
  border-top: 1px solid #2e3347;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px 16px 30px;
}
.modal-handle { width: 36px; height: 4px; background: #2e3347; border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.email-box {
  background: #22263a;
  border: 1px solid #2e3347;
  border-radius: 12px;
  padding: 14px;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  color: #eef0f8;
  margin-bottom: 12px;
  word-break: break-word;
}
.email-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.email-lbl { font-size: 12px; color: #7a7f9a; min-width: 48px; font-weight: 600; }
.copy-row { display: flex; gap: 8px; }
.copy-row .btn { margin-bottom: 0; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="header">
  <div class="header-left">
    <span class="logo">5S</span>
    <div class="header-info">
      <h1>Tournee Terrain</h1>
      <p id="hDate">--/--/----</p>
    </div>
  </div>
  <div class="badge-count" id="badgeCount">0</div>
</div>

<!-- ACCUEIL -->
<div class="screen active" id="s-accueil">
  <div class="stitle">Resume de tournee</div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num red" id="sc">0</div><div class="stat-lbl">Critique</div></div>
    <div class="stat-box"><div class="stat-num yel" id="sm">0</div><div class="stat-lbl">Majeur</div></div>
    <div class="stat-box"><div class="stat-num blu" id="smi">0</div><div class="stat-lbl">Mineur</div></div>
  </div>
  <div class="card">
    <div class="stitle">Infos tournee</div>
    <div class="field"><label>Nom de l'agent</label><input type="text" id="cfgAgent" placeholder="Votre nom"></div>
    <div class="field"><label>Date</label><input type="date" id="cfgDate"></div>
    <div class="field"><label>Zone / Batiment</label><input type="text" id="cfgZone" placeholder="ex : Impasse 87"></div>
    <div class="field"><label>Destinataire du mail</label><input type="text" id="cfgMailTo" placeholder="ex : Pierre-Yves"></div>
    <button class="btn btn-ghost" onclick="saveConfig()">Enregistrer la configuration</button>
  </div>
  <button class="btn btn-yellow" onclick="goTo('s-ajouter')">+ Signaler un probleme</button>
</div>

<!-- AJOUTER -->
<div class="screen" id="s-ajouter">
  <div class="stitle">Nouveau signalement</div>
  <div class="card">
    <div class="field">
      <label>Priorite</label>
      <div class="pchips">
        <div class="pchip" id="pc-critique" onclick="selPrio('critique')">🔴 Critique</div>
        <div class="pchip" id="pc-majeur"   onclick="selPrio('majeur')">🟡 Majeur</div>
        <div class="pchip" id="pc-mineur"   onclick="selPrio('mineur')">🔵 Mineur</div>
      </div>
    </div>
    <div class="field">
      <label>Zone</label>
      <div class="zchips" id="zchips">
        <div class="zchip active" onclick="selZone(this,'Zone commune')">Zone commune</div>
        <div class="zchip" onclick="selZone(this,'Passerelle')">Passerelle</div>
        <div class="zchip" onclick="selZone(this,'Toiture')">Toiture</div>
        <div class="zchip" onclick="selZone(this,'Fosse')">Fosse</div>
        <div class="zchip" onclick="selZone(this,'Entrepot')">Entrepot</div>
        <div class="zchip" onclick="selZone(this,'Bureaux')">Bureaux</div>
        <div class="zchip" onclick="selZone(this,'Sanitaires')">Sanitaires</div>
      </div>
    </div>
    <div class="field">
      <label>Categorie 5S</label>
      <select id="fCat">
        <option value="Seiri - Tri">Seiri - Tri (eliminer le superflu)</option>
        <option value="Seiton - Rangement">Seiton - Rangement</option>
        <option value="Seiso - Nettoyage">Seiso - Nettoyage</option>
        <option value="Seiketsu - Standardisation">Seiketsu - Standardisation</option>
        <option value="Shitsuke - Discipline">Shitsuke - Discipline</option>
        <option value="Securite">Securite</option>
      </select>
    </div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Decrivez le probleme observe..."></textarea></div>
    <div class="field"><label>Action requise</label><input type="text" id="fAction" placeholder="ex : Remplacer, Nettoyer..."></div>
    <div class="field">
      <label>Photos</label>
      <div class="photo-grid" id="photoGrid">
        <div class="add-photo-btn" onclick="document.getElementById('photoInput').click()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M16 7l-2-3H10L8 7"/><circle cx="12" cy="13" r="3"/></svg>
          Photo
        </div>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
    </div>
    <button class="btn btn-yellow" onclick="saveProblem()">Enregistrer le signalement</button>
    <button class="btn btn-ghost" onclick="goTo('s-liste')">Voir la liste</button>
  </div>
</div>

<!-- LISTE -->
<div class="screen" id="s-liste">
  <div class="stitle">Problemes signales</div>
  <div id="probList"></div>
</div>

<!-- MAIL -->
<div class="screen" id="s-mail">
  <div class="stitle">Rapport de tournee</div>
  <div class="card">
    <div class="email-row"><span class="email-lbl">A :</span><input type="text" id="mTo" placeholder="Destinataire" style="padding:8px 12px;font-size:13px"></div>
    <div class="email-row"><span class="email-lbl">Cc :</span><input type="text" id="mCc" placeholder="Gildas Blanchard" style="padding:8px 12px;font-size:13px"></div>
    <div class="email-row"><span class="email-lbl">Objet :</span><input type="text" id="mSub" style="padding:8px 12px;font-size:13px"></div>
  </div>
  <button class="btn btn-yellow" onclick="genMail()">Generer le mail</button>
  <div id="mailOutput" style="display:none">
    <div class="stitle">Apercu du mail</div>
    <div class="email-box" id="mailText"></div>
    <div class="copy-row">
      <button class="btn btn-green" onclick="copyMail()">Copier</button>
      <button class="btn btn-ghost" onclick="openMail()">Ouvrir Mail</button>
    </div>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="active" id="nb-accueil" onclick="goTo('s-accueil')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </button>
  <button id="nb-ajouter" onclick="goTo('s-ajouter')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Signaler
  </button>
  <button id="nb-liste" onclick="goTo('s-liste')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
    Liste
  </button>
  <button id="nb-mail" onclick="goTo('s-mail')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
    Mail
  </button>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle"></div>
    <div id="mBody"></div>
    <button class="btn btn-ghost" onclick="closeModal()" style="margin-top:14px">Fermer</button>
  </div>
</div>

<script>
var problems = [];
var cfg = {};
var photos = [];
var prio = 'majeur';
var zone = 'Zone commune';

try { problems = JSON.parse(localStorage.getItem('5s_probs') || '[]'); } catch(e) { problems = []; }
try { cfg = JSON.parse(localStorage.getItem('5s_cfg') || '{}'); } catch(e) { cfg = {}; }

window.onload = function() {
  var today = new Date().toISOString().slice(0, 10);
  document.getElementById('cfgDate').value   = cfg.date   || today;
  document.getElementById('cfgAgent').value  = cfg.agent  || '';
  document.getElementById('cfgZone').value   = cfg.zone   || 'Impasse 87';
  document.getElementById('cfgMailTo').value = cfg.mailTo || '';
  document.getElementById('hDate').textContent = fmtDate(cfg.date || today);
  selPrio('majeur');
  refreshStats();
};

function goTo(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  var btns = document.querySelectorAll('#nav button');
  for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
  var nb = document.getElementById('nb-' + id.replace('s-', ''));
  if (nb) nb.classList.add('active');
  if (id === 's-liste') renderList();
  if (id === 's-mail')  prefillMail();
  window.scrollTo(0, 0);
}

function saveConfig() {
  cfg = {
    agent:  document.getElementById('cfgAgent').value,
    date:   document.getElementById('cfgDate').value,
    zone:   document.getElementById('cfgZone').value,
    mailTo: document.getElementById('cfgMailTo').value
  };
  localStorage.setItem('5s_cfg', JSON.stringify(cfg));
  document.getElementById('hDate').textContent = fmtDate(cfg.date);
  toast('Configuration enregistree !');
}

function selPrio(p) {
  prio = p;
  var ids = ['critique', 'majeur', 'mineur'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById('pc-' + ids[i]);
    el.className = 'pchip' + (ids[i] === p ? ' sel-' + p : '');
  }
}

function selZone(el, z) {
  zone = z;
  var chips = document.querySelectorAll('.zchip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
}

function addPhotos(input) {
  var files = Array.from(input.files);
  files.forEach(function(f) {
    var r = new FileReader();
    r.onload = function(e) { photos.push(e.target.result); renderPhotoGrid(); };
    r.readAsDataURL(f);
  });
  input.value = '';
}

function renderPhotoGrid() {
  var grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  for (var i = 0; i < photos.length; i++) {
    var d = document.createElement('div');
    d.className = 'photo-thumb';
    d.innerHTML = '<img src="' + photos[i] + '"><button class="del-ph" onclick="delPhoto(' + i + ')">x</button>';
    grid.appendChild(d);
  }
  var add = document.createElement('div');
  add.className = 'add-photo-btn';
  add.onclick = function() { document.getElementById('photoInput').click(); };
  add.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M16 7l-2-3H10L8 7"/><circle cx="12" cy="13" r="3"/></svg>Photo';
  grid.appendChild(add);
}

function delPhoto(i) { photos.splice(i, 1); renderPhotoGrid(); }

function saveProblem() {
  var desc = document.getElementById('fDesc').value.trim();
  if (!desc) { toast('Decrivez le probleme !'); return; }
  var now = new Date();
  var time = (now.getHours() < 10 ? '0' : '') + now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
  problems.unshift({
    id: Date.now(),
    prio: prio,
    zone: zone,
    cat: document.getElementById('fCat').value,
    desc: desc,
    action: document.getElementById('fAction').value.trim(),
    photos: photos.slice(),
    resolved: false,
    time: time
  });
  save();
  document.getElementById('fDesc').value = '';
  document.getElementById('fAction').value = '';
  document.getElementById('fCat').selectedIndex = 0;
  photos = [];
  renderPhotoGrid();
  selPrio('majeur');
  var chips = document.querySelectorAll('.zchip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.toggle('active', i === 0);
  zone = 'Zone commune';
  refreshStats();
  toast('Signalement enregistre !');
  goTo('s-liste');
}

function renderList() {
  var c = document.getElementById('probList');
  if (!problems.length) {
    c.innerHTML = '<div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>Aucun probleme signale</p></div>';
    return;
  }
  var icons = { critique: '🔴', majeur: '🟡', mineur: '🔵' };
  var html = '';
  for (var i = 0; i < problems.length; i++) {
    var p = problems[i];
    html += '<div class="prob-item' + (p.resolved ? ' resolved' : '') + '">' +
      '<div class="prob-icon ic-' + p.prio + '">' + icons[p.prio] + '</div>' +
      '<div class="prob-body">' +
        '<div class="prob-title">' + esc(p.desc) + '</div>' +
        '<div class="prob-meta"><span class="badge b-' + p.prio + '">' + p.prio + '</span><span>' + esc(p.zone) + '</span><span>' + p.time + '</span></div>' +
        (p.action ? '<div style="font-size:12px;color:#7a7f9a;margin-top:4px">→ ' + esc(p.action) + '</div>' : '') +
        (p.photos.length ? '<div style="font-size:11px;color:#7a7f9a;margin-top:4px">📷 ' + p.photos.length + ' photo(s)</div>' : '') +
        '<div class="prob-actions">' +
          '<button class="btn-sm" style="background:#22263a;color:#eef0f8;border:1px solid #2e3347" onclick="detail(' + i + ')">Detail</button>' +
          '<button class="btn-sm" style="background:#22263a;color:#eef0f8;border:1px solid #2e3347" onclick="toggleRes(' + i + ')">' + (p.resolved ? 'Rouvrir' : 'Resolu') + '</button>' +
          '<button class="btn-sm" style="background:rgba(248,113,113,0.1);color:#f87171;border:1px solid rgba(248,113,113,0.2)" onclick="delProb(' + i + ')">Suppr.</button>' +
        '</div>' +
      '</div></div>';
  }
  c.innerHTML = html;
}

function toggleRes(i) { problems[i].resolved = !problems[i].resolved; save(); renderList(); refreshStats(); }

function delProb(i) {
  if (!confirm('Supprimer ?')) return;
  problems.splice(i, 1);
  save(); renderList(); refreshStats();
  toast('Supprime');
}

function detail(i) {
  var p = problems[i];
  document.getElementById('mTitle').textContent = p.desc;
  var ph = '';
  if (p.photos.length) {
    ph = '<div class="photo-grid">';
    for (var j = 0; j < p.photos.length; j++) ph += '<div class="photo-thumb"><img src="' + p.photos[j] + '"></div>';
    ph += '</div>';
  } else {
    ph = '<p style="font-size:13px;color:#7a7f9a">Aucune photo</p>';
  }
  document.getElementById('mBody').innerHTML =
    '<p style="margin-bottom:10px"><span class="badge b-' + p.prio + '">' + p.prio + '</span>&nbsp;&nbsp;' + esc(p.zone) + ' - ' + p.time + '</p>' +
    '<p style="font-size:13px;color:#7a7f9a;margin-bottom:8px">Categorie : ' + esc(p.cat) + '</p>' +
    (p.action ? '<p style="font-size:13px;margin-bottom:12px">Action : ' + esc(p.action) + '</p>' : '') + ph;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function refreshStats() {
  var open = [];
  for (var i = 0; i < problems.length; i++) if (!problems[i].resolved) open.push(problems[i]);
  document.getElementById('badgeCount').textContent = open.length;
  var c = 0, m = 0, mi = 0;
  for (var j = 0; j < open.length; j++) {
    if (open[j].prio === 'critique') c++;
    else if (open[j].prio === 'majeur') m++;
    else mi++;
  }
  document.getElementById('sc').textContent  = c;
  document.getElementById('sm').textContent  = m;
  document.getElementById('smi').textContent = mi;
}

function prefillMail() {
  document.getElementById('mTo').value  = cfg.mailTo || '';
  document.getElementById('mCc').value  = 'Gildas Blanchard';
  var z = cfg.zone || 'Impasse 87';
  var d = fmtDate(cfg.date || new Date().toISOString().slice(0, 10));
  document.getElementById('mSub').value = 'Compte-rendu tournee 5S - ' + z + ' - ' + d;
}

function genMail() {
  var agent = cfg.agent  || '[Agent]';
  var z     = cfg.zone   || 'Impasse 87';
  var d     = fmtDate(cfg.date || new Date().toISOString().slice(0, 10));
  var to    = document.getElementById('mTo').value || '[Destinataire]';
  var open = [], done = [];
  for (var i = 0; i < problems.length; i++) {
    if (problems[i].resolved) done.push(problems[i]); else open.push(problems[i]);
  }
  function section(label, key, emoji) {
    var items = [];
    for (var i = 0; i < open.length; i++) if (open[i].prio === key) items.push(open[i]);
    if (!items.length) return '';
    var s = '\n' + emoji + ' ' + label.toUpperCase() + ' (' + items.length + ')\n';
    for (var j = 0; j < items.length; j++) {
      s += '  ' + (j+1) + '. [' + items[j].zone + '] ' + items[j].desc;
      if (items[j].action) s += '\n     Action : ' + items[j].action;
      if (items[j].photos.length) s += '\n     Photos : ' + items[j].photos.length + ' jointe(s)';
      s += '\n';
    }
    return s;
  }
  var body = 'Bonjour ' + to + ',\n\n' +
    'Dans le cadre du 5S de l\'' + z + ', qui m\'a ete confie par Gildas Blanchard,\n' +
    'je vous adresse le compte-rendu de ma tournee terrain du ' + d + '.\n\n' +
    '------------------------------------------\n' +
    'RESUME\n' +
    '------------------------------------------\n' +
    'Agent  : ' + agent + '\n' +
    'Zone   : ' + z + '\n' +
    'Date   : ' + d + '\n' +
    'Ouverts : ' + open.length + '\n' +
    'Resolus : ' + done.length + '\n\n' +
    '------------------------------------------\n' +
    'PROBLEMES SIGNALES\n' +
    '------------------------------------------' +
    (section('Critique', 'critique', '🔴') || '') +
    (section('Majeur',   'majeur',   '🟡') || '') +
    (section('Mineur',   'mineur',   '🔵') || '') +
    (open.length === 0 ? '\n  Aucun probleme ouvert lors de cette tournee.\n' : '') +
    '\n------------------------------------------\n' +
    'ACTIONS ATTENDUES\n' +
    '------------------------------------------\n' +
    'Merci de prendre en compte les points signales,\n' +
    'en particulier les niveaux Critique et Majeur\n' +
    'qui necessitent une intervention prioritaire.\n\n' +
    'Je reste disponible pour tout complement d\'information.\n\n' +
    'Bien cordialement,\n' + agent + '\nReferent 5S - ' + z;
  document.getElementById('mailText').textContent = body;
  document.getElementById('mailOutput').style.display = 'block';
  document.getElementById('mailOutput').scrollIntoView({ behavior: 'smooth' });
}

function copyMail() {
  var txt = document.getElementById('mailText').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(function() { toast('Copie !'); }).catch(function() { fallbackCopy(txt); });
  } else {
    fallbackCopy(txt);
  }
}

function fallbackCopy(txt) {
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); toast('Copie !'); } catch(e) { toast('Copiez manuellement'); }
  document.body.removeChild(ta);
}

function openMail() {
  var sub  = encodeURIComponent(document.getElementById('mSub').value);
  var body = encodeURIComponent(document.getElementById('mailText').textContent);
  window.location.href = 'mailto:?subject=' + sub + '&body=' + body;
}

function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-');
  if (p.length !== 3) return d;
  return p[2] + '/' + p[1] + '/' + p[0];
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function save() { localStorage.setItem('5s_probs', JSON.stringify(problems)); }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
